name: AutoDoc

on:
  push:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect new JS modules
        id: detect
        run: |
          # Find files that are newly added in this push
          NEW_FILES=$(git diff --diff-filter=A --name-only HEAD~1 HEAD | grep '\.js$' || true)

          echo "New JS files:"
          echo "$NEW_FILES"

          # Export as output
          echo "files=$NEW_FILES" >> $GITHUB_OUTPUT

      - name: Generate documentation
        if: steps.detect.outputs.files != ''
        run: |
          mkdir -p documentation

          for file in ${{ steps.detect.outputs.files }}; do
            echo "Generating docs for $file"
            python scripts/generate_documentation.py "$file" > "documentation/$(basename "$file").txt"
          done

      - name: Commit docs to autodocs branch
        if: steps.detect.outputs.files != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Create a separate worktree for the autodocs branch
          git fetch origin
          git worktree add autodocs-worktree autodocs || git worktree add -b autodocs autodocs-worktree

          cp -r documentation/* autodocs-worktree/

          cd autodocs-worktree
          git add .
          git commit -m "Auto-generated documentation for new modules" || echo "No changes"
          git push origin autodocs
